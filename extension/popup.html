<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ATProto Social</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <header>
        <h1>ATProto</h1>
        <button id="open-options" type="button" title="Configure account">⚙</button>
      </header>

      <div class="tabs" role="tablist">
        <button class="tab active" id="tab-margin" role="tab" aria-selected="true" aria-controls="panel-margin">Margin</button>
        <button class="tab" id="tab-frontpage" role="tab" aria-selected="false" aria-controls="panel-frontpage">Frontpage</button>
      </div>

      <div id="panel-margin" role="tabpanel">
        <form id="margin-form">
          <label for="margin-selection">Selected text</label>
          <textarea id="margin-selection" name="selection" rows="4" readonly placeholder="Select text on the page first…"></textarea>

          <label for="margin-comment">Comment <span class="counter">(optional)</span></label>
          <textarea id="margin-comment" name="comment" rows="3" placeholder="Add a note… (leave empty to just highlight)"></textarea>

          <button id="margin-submit-btn" type="submit">Highlight on Margin</button>
        </form>
        <p id="margin-status" role="status" aria-live="polite"></p>
        <footer>
          <a id="open-margin" href="https://margin.at" target="_blank" rel="noreferrer">Open margin.at</a>
        </footer>
      </div>

      <div id="panel-frontpage" role="tabpanel" hidden>
        <form id="submit-form">
          <label for="title">
            Title
            <span id="title-count" class="counter">0/120</span>
          </label>
          <input id="title" name="title" type="text" maxlength="120" required />

          <label for="url">URL</label>
          <input id="url" name="url" type="url" required />

          <button id="submit-btn" type="submit">Post to Frontpage</button>
        </form>
        <p id="status" role="status" aria-live="polite"></p>
        <footer>
          <a id="open-frontpage" href="https://frontpage.fyi" target="_blank" rel="noreferrer">Open frontpage.fyi</a>
        </footer>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
